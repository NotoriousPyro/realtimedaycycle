name: Run tests
on: [pull_request]
jobs:
  jest-tests:
    name: Jest tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Set-up node
        uses: actions/setup-node@v3
        with:
          node-version: 16
          cache: npm
      - name: Install dependencies
        run: npm i
      - name: Run tests
        run: npm test
